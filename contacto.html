<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FRAMEWORK BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- LIBRERÍA DE FUENTES -->
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Urbanist:ital,wght@0,100..900;1,100..900&family=Momo+Trust+Display&display=swap"
        rel="stylesheet">

    <!-- LIBRERÍA DE ÍCONOS FONTAWESOME -->
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>

    <!-- FAVICON: ÍCONO PARA LA PESTAÑA DEL NAVEGADOR -->
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">

    <!-- HOJA DE ESTILOS CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- LIBRERÍA DE JQUERY -->
    <script src="js/jquery.js"></script>
</head>

<body>
    <header id="header">
        <nav class="menu">
            <div class="logo">
                <a href="index.html">
                    <img src="img/logo_unfv.jpeg" alt="" class="img-fluid img-logo">
                </a>
                <a href="#" class="btn-menu" id="btn-menu">
                    <i class="fa-solid fa-bars icono-menu"></i>
                </a>
            </div>
            <div class="enlaces" id="enlaces">
                <a href="index.html">SOBRE NOSOTROS</a>
                <a href="facultades_y_carreras.html">FACULTADES Y CARRERAS</a>
                <a href="beneficios.html">BENEFICIOS</a>
                <a href="admision.html">ADMISIÓN</a>
                <a href="contacto.html">CONTÁCTANOS</a>
            </div>
        </nav>
    </header>

    <article class="container">
        <section class="contacto-intro">
            <h1>Contacto</h1>
            <p>
                Da el primer paso hacia tu futuro profesional. Déjanos tus datos en el
                siguiente formulario y te enviaremos toda la información que necesitas
                sobre la Universidad Nacional Federico Villarreal. Tu futuro empieza aquí.
            </p>
        </section>

        <section class="contacto-form-contenedor">
            <form action="#" method="post" class="contacto-form">
                <div class="contacto-lista">
                    <select required>
                        <option value="" disabled selected>Facultad</option>
                        <option value="fa">Administración</option>
                        <option value="fau">Arquitectura y Urbanismo</option>
                        <option value="fce">Ciencias Económicas</option>
                        <option value="fcfc">Ciencias Financieras y Contables</option>
                        <option value="fccnnm">Ciencias Naturales y Matemática</option>
                        <option value="fccss">Ciencias Sociales</option>
                        <option value="fdcp">Derecho y Ciencia Política</option>
                        <option value="fe">Educación</option>
                        <option value="fh">Humanidades</option>
                        <option value="fic">Ingeniería Civil</option>
                        <option value="fiei">Ingeniería Electrónica e Informática</option>
                        <option value="figae">Ingeniería Geográfica, Ambiental y Ecoturismo</option>
                        <option value="fiis">Ingeniería Industrial y de Sistemas</option>
                        <option value="fmhu">Medicina "Hipólito Unanue"</option>
                        <option value="fopca">Oceanografía, Pesquería, C. Alimentarias y Acuicultura
                        </option>
                        <option value="fo">Odontología</option>
                        <option value="faps">Psicología</option>
                        <option value="ftm">Tecnología Médica</option>
                    </select>
                </div>

                <div class="contacto-caja">
                    <input type="text" placeholder="Apellidos" required>
                </div>
                <div class="contacto-caja">
                    <input type="text" placeholder="Nombres" required>
                </div>
                <div class="contacto-caja">
                    <input type="email" placeholder="Correo electrónico" required>
                </div>
                <div class="contacto-caja">
                    <input type="tel" placeholder="Teléfono o celular" maxlength="9" required>
                </div>
                <div class="contacto-caja">
                    <input type="text" placeholder="Documento de identidad" maxlength="8" required>
                </div>

                <div class="contacto-caja">
                    <input type="text" placeholder="Asunto" required>
                </div>
                <div class="contacto-caja">
                    <textarea placeholder="Mensaje"></textarea>
                </div>

                <div class="contacto-btn-envio">
                    <input type="submit">
                </div>
            </form>
        </section>

        <section class="contacto-mapa">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d487.74312103414894!2d-77.03995675358362!3d-12.047307475735819!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9105c9006b326cef%3A0xc3c703df04046d1!2sUniversidad%20Nacional%20Federico%20Villarreal%20-%20Sede%20Central.!5e0!3m2!1ses-419!2spe!4v1772655774661!5m2!1ses-419!2spe"
                style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>
    </article>

    <a href="#">
        <i class="fa-solid fa-chevron-up ir-arriba"></i>
    </a>

    <script src="js/headroom.min.js"></script>
    <script src="js/menu-flex.js"></script>
</body>

</html>
